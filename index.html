<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>形近字大挑戰（康軒版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* 修正注音排版 */
        ruby {
            display: inline-flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            margin: 0 0.1em; 
            position: relative;
            vertical-align: middle;
            line-height: 1;
        }

        rt {
            display: flex;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 0.38em; 
            line-height: 1;
            color: #4b5563;
            padding-left: 0.2em;
            font-family: sans-serif; 
            position: relative;
            letter-spacing: 0.02em;
            justify-content: center;
            min-width: 1em; 
        }

        .tone-mark {
            display: inline-block;
            position: absolute;
            right: -0.7em; 
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9em;
        }

        .tone-light {
            display: block;
            position: absolute;
            top: -0.3em;
            left: 50%;
            transform: translateX(-50%);
            line-height: 0;
        }

        .game-card {
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid #fff;
            border-radius: 2rem;
            width: 100%;
            background-color: white;
        }

        .option-btn {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            word-break: break-all;
        }

        .opt-left {
            background-color: #fee2e2;
            border-color: #f87171;
            color: #991b1b;
        }

        .opt-right {
            background-color: #dcfce7;
            border-color: #4ade80;
            color: #166534;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.05);
            filter: brightness(0.95);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .bounce {
            animation: bounce 0.6s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        .bracket {
            color: #f97316;
            margin: 0 0.15em;
            font-weight: 900;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 2.2em;
        }

        .rationale-card {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 1rem;
            padding: 0.75rem;
            border: 2px dashed #e2e8f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 120px;
        }
    </style>
</head>
<body class="flex flex-col items-center py-6 sm:py-12 px-4">

    <div id="game-container" class="w-full max-w-2xl">
        <!-- 封面頁 -->
        <div id="start-screen" class="game-card bg-yellow-400 p-8 text-center border-orange-500">
            <div class="mb-6">
                <span class="text-6xl floating inline-block">✏️</span>
            </div>
            <h1 id="title-area" class="text-3xl sm:text-4xl font-black text-orange-900 mb-6"></h1>
            
            <div id="course-info" class="text-orange-900 text-base sm:text-lg mb-8 font-bold tracking-tight bg-orange-100/50 py-4 px-6 rounded-3xl inline-flex flex-col gap-2">
                <div id="course-line-1"></div>
                <div id="course-line-2"></div>
            </div>
            
            <div class="block">
                <button onclick="startGame()" class="bg-orange-600 hover:bg-orange-700 text-white text-xl sm:text-2xl font-bold py-4 px-10 rounded-full shadow-lg transition-all transform hover:scale-110">
                    <span id="start-btn-text"></span>
                </button>
            </div>
        </div>

        <!-- 遊戲主畫面 -->
        <div id="quiz-screen" class="hidden w-full">
            <div class="mb-4 flex justify-between items-center bg-white px-5 py-3 rounded-full shadow-md">
                <div class="text-orange-700 font-bold text-sm sm:text-base" id="quiz-header-left"></div>
                <div class="flex-grow mx-4 bg-gray-200 h-3 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-orange-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <div class="text-green-700 font-bold text-sm sm:text-base" id="quiz-header-right"></div>
            </div>

            <div class="game-card p-6 sm:p-10 border-blue-400 flex flex-col items-center">
                <div id="question-text" class="text-4xl sm:text-5xl font-bold text-gray-800 text-center mb-8 leading-relaxed min-h-[160px] flex flex-wrap items-center justify-center w-full"></div>
                
                <div id="options-container" class="flex justify-center gap-4 sm:gap-10 mb-6 w-full"></div>
                
                <div id="feedback-area" class="hidden mt-4 p-5 rounded-3xl text-center border-2 bg-yellow-50 border-yellow-200 w-full">
                    <p id="feedback-result" class="text-2xl font-bold mb-4"></p>
                    
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div id="compare-left" class="rationale-card"></div>
                        <div id="compare-right" class="rationale-card"></div>
                    </div>
                    
                    <button id="next-btn" onclick="nextQuestion()" class="bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold py-4 px-12 rounded-full shadow-lg"></button>
                </div>
            </div>
        </div>

        <!-- 結算畫面 -->
        <div id="result-screen" class="hidden game-card bg-purple-600 p-10 text-center border-purple-800 text-white">
            <h2 id="result-title" class="text-3xl sm:text-4xl font-bold mb-6"></h2>
            <div class="text-7xl mb-6" id="result-emoji">🏆</div>
            <div id="result-score-display" class="text-5xl font-black mb-6 text-yellow-300"></div>
            <div id="result-text" class="text-xl sm:text-2xl mb-10 font-bold opacity-95 leading-relaxed"></div>
            <button onclick="resetGame()" class="bg-white text-purple-700 text-2xl font-bold py-4 px-12 rounded-full hover:bg-gray-100 shadow-xl transition-all transform hover:scale-105">
                <span id="retry-btn-text"></span>
            </button>
        </div>
    </div>

    <script>
        function rb(str) {
            if (!str) return "";
            // 題目預設顯示「　」
            let formatted = str.replace(/「 」/g, '<span class="bracket">「　」</span>');
            return formatted.replace(/([^\x00-\xff])\(([^)]+)\)/g, (match, char, pinyin) => {
                let tone = "";
                let mainPinyin = pinyin;
                if (pinyin.includes('ˊ')) { tone = '<span class="tone-mark">ˊ</span>'; mainPinyin = pinyin.replace('ˊ', ''); }
                else if (pinyin.includes('ˇ')) { tone = '<span class="tone-mark">ˇ</span>'; mainPinyin = pinyin.replace('ˇ', ''); }
                else if (pinyin.includes('ˋ')) { tone = '<span class="tone-mark">ˋ</span>'; mainPinyin = pinyin.replace('ˋ', ''); }
                else if (pinyin.includes('˙')) { tone = '<span class="tone-light">˙</span>'; mainPinyin = pinyin.replace('˙', ''); }
                return `<ruby>${char}<rt>${mainPinyin}${tone}</rt></ruby>`;
            });
        }

        const fullQuizData = [
            { q: "眼(ㄧㄢˇ)「 」", correct: { char: "鏡", py: "ㄐㄧㄥˋ", phrase: "眼(ㄧㄢˇ)鏡(ㄐㄧㄥˋ)" }, wrong: { char: "境", py: "ㄐㄧㄥˋ", phrase: "環(ㄏㄨㄢˊ)境(ㄐㄧㄥˋ)" }},
            { q: "環(ㄏㄨㄢˊ)「 」", correct: { char: "境", py: "ㄐㄧㄥˋ", phrase: "環(ㄏㄨㄢˊ)境(ㄐㄧㄥˋ)" }, wrong: { char: "鏡", py: "ㄐㄧㄥˋ", phrase: "鏡(ㄐㄧˋ)面(ㄇㄧㄢˋ)" }},
            { q: "收(ㄕㄡ)「 」", correct: { char: "拾", py: "ㄕˊ", phrase: "收(ㄕㄡ)拾(ㄕˊ)" }, wrong: { char: "搭", py: "ㄉㄚ", phrase: "搭(ㄉㄚ)配(ㄆㄟˋ)" }},
            { q: "「 」乘(ㄔㄥˊ)", correct: { char: "搭", py: "ㄉㄚ", phrase: "搭(ㄉㄚ)乘(ㄔㄥˊ)" }, wrong: { char: "拾", py: "ㄕˊ", phrase: "拾(ㄕˊ)取(ㄑㄩˇ)" }},
            { q: "「 」棄(ㄑㄧˋ)", correct: { char: "捨", py: "ㄕㄜˇ", phrase: "捨(ㄕㄜˇ)棄(ㄑㄧˋ)" }, wrong: { char: "拾", py: "ㄕˊ", phrase: "拾(ㄕˊ)得(ㄉㄜˊ)" }},
            { q: "泥(ㄋㄧˊ)「 」", correct: { char: "沙", py: "ㄕㄚ", phrase: "泥(ㄋㄧˊ)沙(ㄕㄚ)" }, wrong: { char: "吵", py: "ㄔㄠˇ", phrase: "吵(ㄔㄠˇ)架(ㄐㄧㄚˋ)" }},
            { q: "「 」鬧(ㄋㄠˋ)", correct: { char: "吵", py: "ㄔㄠˇ", phrase: "吵(ㄔㄠˇ)鬧(ㄋㄠˋ)" }, wrong: { char: "沙", py: "ㄕㄚ", phrase: "沙(ㄕㄚ)灘(ㄊㄢ)" }},
            { q: "美(ㄇㄟˇ)「 」", correct: { char: "妙", py: "ㄇㄧㄠˋ", phrase: "美(ㄇㄟˇ)妙(ㄇㄧㄠˋ)" }, wrong: { char: "吵", py: "ㄔㄠˇ", phrase: "爭(ㄓㄥ)吵(ㄔㄠˇ)" }},
            { q: "煩(ㄈㄢˊ)「 」", correct: { char: "惱", py: "ㄋㄠˇ", phrase: "煩(ㄈㄢˊ)惱(ㄋㄠˇ)" }, wrong: { char: "腦", py: "ㄋㄠˇ", phrase: "大(ㄉㄚˋ)腦(ㄋㄠˇ)" }},
            { q: "電(ㄉㄧㄢˋ)「 」", correct: { char: "腦", py: "ㄋㄠˇ", phrase: "電(ㄉㄧㄢˋ)腦(ㄋㄠˇ)" }, wrong: { char: "惱", py: "ㄋㄠˇ", phrase: "苦(ㄎㄨˇ)惱(ㄋㄠˇ)" }},
            { q: "「 」燈(ㄉㄥ)", correct: { char: "電", py: "ㄉㄧㄢˋ", phrase: "電(ㄉㄧㄢˋ)燈(ㄉㄥ)" }, wrong: { char: "雷", py: "ㄌㄟˊ", phrase: "打(ㄉㄚˇ)雷(ㄌㄟˊ)" }},
            { q: "打(ㄉㄚˇ)「 」", correct: { char: "雷", py: "ㄌㄟˊ", phrase: "打(ㄉㄚˇ)雷(ㄌㄟˊ)" }, wrong: { char: "電", py: "ㄉㄧㄢˋ", phrase: "電(ㄉㄧㄢˋ)池(ㄔˊ)" }},
            { q: "「 」骨(ㄍㄨˇ)", correct: { char: "肋", py: "ㄌㄜˋ", phrase: "肋(ㄌㄜˋ)骨(ㄍㄨˇ)" }, wrong: { char: "助", py: "ㄓㄨˋ", phrase: "幫(ㄅㄤ)助(ㄓㄨˋ)" }},
            { q: "幫(ㄅㄤ)「 」", correct: { char: "助", py: "ㄓㄨˋ", phrase: "幫(ㄅㄤ)助(ㄓㄨˋ)" }, wrong: { char: "肋", py: "ㄌㄜˋ", phrase: "胸(ㄒㄩㄥ)肋(ㄌㄜˋ)" }},
            { q: "特(ㄊㄜˋ)「 」", correct: { char: "製", py: "ㄓˋ", phrase: "特(ㄊㄜˋ)製(ㄓˋ)" }, wrong: { char: "制", py: "ㄓˋ", phrase: "制(ㄓˋ)度(ㄉㄨˋ)" }},
            { q: "「 」度(ㄉㄨˋ)", correct: { char: "制", py: "ㄓˋ", phrase: "制(ㄓˋ)度(ㄉㄨˋ)" }, wrong: { char: "製", py: "ㄓˋ", phrase: "製(ㄓˋ)造(ㄗㄠˋ)" }},
            { q: "「 」靠(ㄎㄠˋ)", correct: { char: "倚", py: "ㄧˇ", phrase: "倚(ㄧˇ)靠(ㄎㄠˋ)" }, wrong: { char: "椅", py: "ㄧˇ", phrase: "椅(ㄧˇ)子(ㄗ˙)" }},
            { q: "輪(ㄌㄨㄣˊ)「 」", correct: { char: "椅", py: "ㄧˇ", phrase: "輪(ㄌㄨㄣˊ)椅(ㄧˇ)" }, wrong: { char: "倚", py: "ㄧˇ", phrase: "倚(ㄧˇ)託(ㄊㄨㄛ)" }}
        ];

        let masterPool = []; 
        let currentQuizSession = []; 
        let currentIdx = 0;
        let correctCount = 0;
        let answered = false;
        const totalQuestionsPerGame = 6;

        function initStaticText() {
            document.getElementById('course-line-1').innerHTML = rb("三(ㄙㄢ)下(ㄒㄧㄚˋ)康(ㄎㄤ)軒(ㄒㄩㄢ)國(ㄍㄨㄛˊ)語(ㄩˇ)第(ㄉㄧˋ)三(ㄙㄢ)課(ㄎㄜˋ)");
            document.getElementById('course-line-2').innerHTML = rb("遇(ㄩˋ)見(ㄐㄧㄢˋ)美(ㄇㄟˇ)如(ㄖㄨˊ)奶(ㄋㄞˇ)奶(ㄋㄞˇ)");
            document.getElementById('title-area').innerHTML = rb("形(ㄒㄧㄥˊ)近(ㄐㄧˋ)字(ㄗˋ)大(ㄉㄚˋ)挑(ㄊㄧㄠˇ)戰(ㄓㄢˋ)");
            document.getElementById('start-btn-text').innerHTML = rb("開(ㄎㄞ)始(ㄕˇ)挑(ㄊㄧˇ)戰(ㄓㄢˋ)");
            document.getElementById('retry-btn-text').innerHTML = rb("再(ㄗㄞˋ)玩(ㄨㄢˊ)一(ㄧˊ)次(ㄘˋ)");
            document.getElementById('result-title').innerHTML = rb("挑(ㄊㄧˇ)戰(ㄓㄢˋ)結(ㄐㄧㄝˊ)束(ㄕㄨˋ)！");
            document.getElementById('next-btn').innerHTML = rb("下(ㄒㄧㄚˋ)一(ㄧˋ)題(ㄊㄧˊ) ➡️");
        }

        function startGame() {
            if (masterPool.length < totalQuestionsPerGame) {
                masterPool = [...fullQuizData].sort(() => Math.random() - 0.5);
            }
            currentQuizSession = masterPool.splice(0, totalQuestionsPerGame);
            currentIdx = 0;
            correctCount = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const data = currentQuizSession[currentIdx];
            answered = false;
            document.getElementById('quiz-header-left').innerHTML = rb(`第 ${currentIdx + 1} / ${totalQuestionsPerGame} 題`);
            document.getElementById('quiz-header-right').innerHTML = rb(`答對：${correctCount}`);
            document.getElementById('progress-bar').style.width = ((currentIdx + 1) / totalQuestionsPerGame * 100) + '%';
            document.getElementById('question-text').innerHTML = rb(data.q);
            document.getElementById('feedback-area').classList.add('hidden');
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const isCorrectOnLeft = Math.random() > 0.5;
            const options = isCorrectOnLeft 
                ? [{ char: data.correct.char, isCorrect: true, side: 'left' }, { char: data.wrong.char, isCorrect: false, side: 'right' }]
                : [{ char: data.wrong.char, isCorrect: false, side: 'left' }, { char: data.correct.char, isCorrect: true, side: 'right' }];
            
            options.forEach((opt) => {
                const btn = document.createElement('button');
                const sideClass = opt.side === 'left' ? 'opt-left' : 'opt-right';
                btn.className = `option-btn ${sideClass} min-w-[120px] sm:min-w-[150px] min-h-[120px] sm:min-h-[150px] text-5xl sm:text-7xl font-bold rounded-3xl border-4 shadow-md`;
                btn.innerText = opt.char;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedOpt, selectedBtn) {
            if (answered) return;
            answered = true;
            const data = currentQuizSession[currentIdx];
            const isCorrect = selectedOpt.isCorrect;
            
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach((btn) => {
                btn.disabled = true;
                if (btn.innerText === data.correct.char) {
                    btn.className = "option-btn min-w-[120px] sm:min-w-[150px] min-h-[120px] sm:min-h-[150px] text-5xl sm:text-7xl font-bold rounded-3xl border-4 bg-yellow-300 text-yellow-900 border-yellow-500 scale-105 shadow-lg z-10";
                } else if (!isCorrect && btn === selectedBtn) {
                    btn.className = "option-btn min-w-[120px] sm:min-w-[150px] min-h-[120px] sm:min-h-[150px] text-5xl sm:text-7xl font-bold rounded-3xl border-4 bg-gray-100 text-gray-400 border-gray-300 opacity-60";
                }
            });

            const feedback = document.getElementById('feedback-area');
            feedback.classList.remove('hidden');
            document.getElementById('feedback-result').innerHTML = isCorrect ? rb("🌟 答(ㄉㄚˊ)對(ㄉㄨㄟˋ)了(ㄌㄜ˙)！") : rb("❌ 再(ㄗㄞˋ)加(ㄐㄧㄚ)把(ㄅㄚˇ)勁(ㄐㄧˋ)！");
            document.getElementById('feedback-result').className = "text-2xl font-bold mb-4 " + (isCorrect ? "text-green-600 bounce" : "text-red-600");
            
            document.getElementById('compare-left').innerHTML = `<div class="text-green-700 font-bold text-sm mb-1">【正確答案】</div><div class="text-3xl mb-1">${rb(data.correct.char + '(' + data.correct.py + ')') }</div><div class="text-base text-gray-800 font-bold">${rb(data.correct.phrase)}</div>`;
            document.getElementById('compare-right').innerHTML = `<div class="text-red-700 font-bold text-sm mb-1">【這是錯的】</div><div class="text-3xl mb-1">${rb(data.wrong.char + '(' + data.wrong.py + ')') }</div><div class="text-base text-gray-800 font-bold">${rb(data.wrong.phrase)}</div>`;

            if (isCorrect) {
                correctCount++;
                // 答對後，顯示正確字詞且不帶括號
                const highlighted = `<span class="text-blue-600 font-black underline mx-1">${rb(data.correct.char + '(' + data.correct.py + ')')}</span>`;
                document.getElementById('question-text').innerHTML = rb(data.q).replace('<span class="bracket">「　」</span>', highlighted);
            }
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < totalQuestionsPerGame) loadQuestion();
            else showResult();
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-score-display').innerHTML = rb(`答(ㄉㄚˊ)對(ㄉㄨㄟˋ) ${correctCount} / ${totalQuestionsPerGame} 題(ㄊㄧˊ)`);
            
            let msg = "";
            if (correctCount === totalQuestionsPerGame) {
                msg = rb("太(ㄊㄞˋ)厲(ㄌㄧˋ)害(ㄏㄞˋ)了(ㄌㄜ˙)！全(ㄑㄩㄢˊ)部(ㄅㄨˋ)答(ㄉㄚˊ)對(ㄉㄨㄟˋ)！");
                document.getElementById('result-emoji').innerText = "🏆";
            } else if (correctCount >= 4) {
                msg = rb("很(ㄏㄣˇ)不(ㄅㄨˊ)錯(ㄘㄨㄛˋ)喔(ㄛ)！再(ㄗㄞˋ)練(ㄌㄧㄢˋ)習(ㄒㄧˊ)一(ㄧˊ)次(ㄘˋ)拼(ㄆㄧㄣ)滿(ㄇㄢˇ)分(ㄈㄣ)！");
                document.getElementById('result-emoji').innerText = "👏";
            } else {
                msg = rb("繼(ㄐㄧˋ)續(ㄒㄩˋ)加油(ㄐㄧㄚㄧㄡˊ)！再(ㄗㄞˋ)練(ㄌㄧㄢˋ)習(ㄒㄧˊ)幾(ㄐㄧˇ)次(ㄘˋ)會(ㄏㄨㄟˋ)更(ㄍㄥˋ)棒(ㄅㄤˋ)！");
                document.getElementById('result-emoji').innerText = "💪";
            }
            document.getElementById('result-text').innerHTML = msg;
        }

        function resetGame() {
            startGame();
        }

        window.onload = initStaticText;
    </script>
</body>
</html>
